<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to ASCII/HEX Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #e5e7eb; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Glow Effects */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .char-row { transition: all 0.2s ease; }
        .char-row:hover {
            background-color: rgba(56, 189, 248, 0.1);
            transform: scale(1.01);
            border-left: 2px solid #38bdf8;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-[#030712] to-black flex items-center justify-center">

    <div class="max-w-4xl w-full space-y-6">
        
        <!-- Header -->
        <header class="text-center space-y-2 mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-emerald-900/30 rounded-2xl border border-emerald-500/30 mb-2 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white">Text-to-Hex Encoder</h1>
            <p class="text-slate-400 text-sm">Real-time ASCII and Hexadecimal character translation</p>
        </header>

        <!-- Input Section -->
        <div class="glass-panel rounded-3xl p-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
            
            <label class="block text-sm font-semibold text-emerald-300 mb-2 uppercase tracking-widest flex justify-between">
                <span>Input String</span>
                <span id="charCount" class="text-slate-500 font-mono">0 / 16 Bytes</span>
            </label>
            
            <div class="relative">
                <input type="text" id="textInput" maxlength="16" 
                    class="w-full bg-black/60 border border-slate-700 rounded-xl px-4 py-4 text-white text-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all placeholder-slate-600 font-mono" 
                    placeholder="e.g., Two One Nine Two" autocomplete="off">
            </div>
            
            <!-- Output Summary -->
            <div class="mt-6 p-4 bg-black/40 border border-slate-800 rounded-xl">
                <p class="text-xs text-slate-500 uppercase tracking-widest mb-1">Raw Hex Output (For AES Input)</p>
                <div class="flex justify-between items-center">
                    <span id="hexSummary" class="text-xl mono font-bold text-sky-400 tracking-wider break-all">Waiting for input...</span>
                    <button onclick="copyHex()" id="copyBtn" class="hidden ml-4 p-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors border border-slate-700 text-slate-300 hover:text-white" title="Copy to Clipboard">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Detailed Breakdown Table -->
        <div class="glass-panel rounded-3xl overflow-hidden">
            <div class="bg-slate-900/80 p-4 border-b border-slate-800 grid grid-cols-4 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <div class="pl-4">Index</div>
                <div>Character</div>
                <div>ASCII (Dec)</div>
                <div>HEX (Base-16)</div>
            </div>
            
            <div id="breakdownTable" class="p-2 space-y-1 min-h-[200px]">
                <div class="text-center text-slate-600 p-8 text-sm italic">
                    Type in the box above to generate the encoding matrix.
                </div>
            </div>
        </div>

    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const hexSummary = document.getElementById('hexSummary');
        const breakdownTable = document.getElementById('breakdownTable');
        const copyBtn = document.getElementById('copyBtn');

        // Main Conversion Logic
        function updateEncoding() {
            const str = textInput.value;
            const len = str.length;
            
            // Update counter
            charCount.innerText = `${len} / 16 Bytes`;
            charCount.className = len === 16 ? "text-emerald-400 font-mono" : "text-slate-500 font-mono";

            if (len === 0) {
                hexSummary.innerText = "Waiting for input...";
                hexSummary.classList.replace('text-emerald-400', 'text-sky-400');
                breakdownTable.innerHTML = '<div class="text-center text-slate-600 p-8 text-sm italic">Type in the box above to generate the encoding matrix.</div>';
                copyBtn.classList.add('hidden');
                return;
            }

            let fullHex = '';
            let htmlBuffer = '';

            for (let i = 0; i < len; i++) {
                const char = str[i];
                const asciiDec = char.charCodeAt(0);
                // Convert to hex and pad with leading 0 if necessary (e.g., 'A' -> 61, Space -> 20)
                const hexVal = asciiDec.toString(16).padStart(2, '0').toUpperCase();
                
                fullHex += hexVal;

                // Visual formatting for space character
                const displayChar = char === ' ' ? '<span class="text-slate-600 italic">Space</span>' : char;

                htmlBuffer += `
                <div class="char-row grid grid-cols-4 items-center bg-black/40 p-3 rounded-lg border border-transparent fade-in" style="animation-delay: ${i * 0.02}s">
                    <div class="pl-4 text-slate-500 mono text-sm">#${i.toString().padStart(2, '0')}</div>
                    <div class="text-white font-bold text-lg">${displayChar}</div>
                    <div class="text-sky-300 mono">${asciiDec}</div>
                    <div class="text-emerald-400 mono font-bold bg-emerald-900/20 inline-block px-2 py-1 rounded w-max border border-emerald-500/20">${hexVal}</div>
                </div>`;
            }

            // Update DOM
            hexSummary.innerText = fullHex;
            hexSummary.classList.replace('text-sky-400', 'text-emerald-400');
            breakdownTable.innerHTML = htmlBuffer;
            copyBtn.classList.remove('hidden');
        }

        // Copy to clipboard functionality
        function copyHex() {
            const hexText = hexSummary.innerText;
            navigator.clipboard.writeText(hexText).then(() => {
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = '<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                setTimeout(() => { copyBtn.innerHTML = originalHtml; }, 2000);
            });
        }

        // Event Listeners
        textInput.addEventListener('input', updateEncoding);
    </script>
</body>
</html>
