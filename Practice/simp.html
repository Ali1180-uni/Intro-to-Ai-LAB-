<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hexadecimal XOR Calculator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Smooth reveal animation */
        .reveal { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar for the table if it gets too long */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex items-center justify-center p-4 lg:p-8 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-gray-950 to-gray-950">

    <!-- Wide Main Wrapper -->
    <div class="flex flex-col lg:flex-row gap-8 w-full max-w-6xl justify-center items-stretch">
        
        <!-- Main Calculator Interface (Wider) -->
        <div class="w-full lg:w-2/3 flex flex-col bg-gray-900/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-gray-800 overflow-hidden">
            
            <!-- Premium Header -->
            <div class="px-8 py-6 border-b border-gray-800 bg-gray-900/50">
                <div class="flex items-center gap-3">
                    <div class="h-8 w-8 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-white tracking-tight">Hex XOR Engine</h1>
                        <p class="text-gray-400 text-sm mt-0.5">High-precision bitwise calculation</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-8 space-y-6 flex-grow">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Value 1 -->
                    <div>
                        <label for="hex1" class="block text-sm font-semibold text-gray-300 mb-2 uppercase tracking-wide">Value 1 (Hex)</label>
                        <div class="relative group">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-indigo-400 font-bold mono text-lg group-focus-within:text-indigo-300 transition-colors">0x</span>
                            <input type="text" id="hex1" 
                                class="block w-full pl-12 pr-4 py-4 bg-gray-950 border border-gray-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg md:text-xl text-white uppercase mono transition-all shadow-inner placeholder-gray-700" 
                                placeholder="DC" autocomplete="off">
                        </div>
                    </div>

                    <!-- Value 2 -->
                    <div>
                        <label for="hex2" class="block text-sm font-semibold text-gray-300 mb-2 uppercase tracking-wide">Value 2 (Hex)</label>
                        <div class="relative group">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-indigo-400 font-bold mono text-lg group-focus-within:text-indigo-300 transition-colors">0x</span>
                            <input type="text" id="hex2" 
                                class="block w-full pl-12 pr-4 py-4 bg-gray-950 border border-gray-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg md:text-xl text-white uppercase mono transition-all shadow-inner placeholder-gray-700" 
                                placeholder="41" autocomplete="off">
                        </div>
                    </div>
                </div>

                <!-- Error Toast -->
                <div id="errorMessage" class="hidden bg-red-900/30 text-red-400 text-sm p-4 rounded-xl border border-red-800/50 flex items-center gap-2">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="errorText"></span>
                </div>

                <!-- Action Button -->
                <button onclick="calculateXOR()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-lg py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] transition-all active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-indigo-500/50 uppercase tracking-widest">
                    Execute XOR
                </button>
            </div>

            <!-- Prominent Results Section -->
            <div id="resultContainer" class="hidden border-t border-gray-800 bg-gray-900/80 p-8 reveal">
                
                <!-- Massive Hex Output -->
                <div class="bg-gray-950 border border-gray-800 rounded-2xl p-6 text-center shadow-inner relative overflow-hidden mb-6">
                    <div class="absolute inset-0 bg-indigo-500/5 blur-xl"></div>
                    <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2 relative z-10">Final Hexadecimal Result</h2>
                    <div class="flex items-center justify-center gap-1 relative z-10">
                        <span class="text-3xl text-indigo-500/70 mono">0x</span>
                        <span id="resHex" class="mono text-5xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]"></span>
                    </div>
                </div>

                <!-- Binary Breakdown Table -->
                <div class="bg-gray-950 border border-gray-800 rounded-xl overflow-hidden text-sm md:text-base">
                    <div class="flex justify-between items-center p-4 border-b border-gray-800/50 text-gray-400">
                        <span class="font-semibold w-24">Input 1</span>
                        <span id="bin1" class="mono text-right break-all"></span>
                    </div>
                    <div class="flex justify-between items-center p-4 border-b border-gray-800/50 text-gray-400">
                        <span class="font-semibold w-24 flex items-center gap-2"><span class="text-xs bg-gray-800 px-1.5 py-0.5 rounded text-gray-300">XOR</span> Input 2</span>
                        <span id="bin2" class="mono text-right break-all"></span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-indigo-900/10 text-indigo-300 font-bold">
                        <span class="w-24 uppercase tracking-wider text-xs">Binary Ans</span>
                        <span id="resBin" class="mono text-right break-all"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Elegant Hex Reference Sidebar -->
        <div class="w-full lg:w-1/3 flex flex-col bg-gray-900/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-gray-800 overflow-hidden">
            <div class="px-6 py-6 border-b border-gray-800 bg-gray-900/50 text-center">
                <h2 class="text-lg font-bold text-white tracking-wide">Translation Matrix</h2>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Hex to 4-Bit Binary</p>
            </div>
            
            <div class="p-6 bg-gray-950 flex-grow">
                <div class="grid grid-cols-2 gap-x-8 gap-y-4 text-base">
                    <!-- Column 1 (0-7) -->
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">0</span><span class="mono text-cyan-400">0000</span></div>
                    <!-- Column 2 (8-F) -->
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">8</span><span class="mono text-cyan-400">1000</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">1</span><span class="mono text-cyan-400">0001</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">9</span><span class="mono text-cyan-400">1001</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">2</span><span class="mono text-cyan-400">0010</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">A</span><span class="mono text-cyan-400">1010</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">3</span><span class="mono text-cyan-400">0011</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">B</span><span class="mono text-cyan-400">1011</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">4</span><span class="mono text-cyan-400">0100</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">C</span><span class="mono text-cyan-400">1100</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">5</span><span class="mono text-cyan-400">0101</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">D</span><span class="mono text-cyan-400">1101</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">6</span><span class="mono text-cyan-400">0110</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">E</span><span class="mono text-cyan-400">1110</span></div>
                    
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">7</span><span class="mono text-cyan-400">0111</span></div>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-2"><span class="font-bold text-gray-100 bg-gray-800 w-6 h-6 flex items-center justify-center rounded">F</span><span class="mono text-cyan-400">1111</span></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Core Logic for Hex XOR
        function calculateXOR() {
            let h1 = document.getElementById('hex1').value.trim().replace(/^0x/i, '');
            let h2 = document.getElementById('hex2').value.trim().replace(/^0x/i, '');
            
            const errorMsg = document.getElementById('errorMessage');
            const resultContainer = document.getElementById('resultContainer');

            // Reset UI states
            errorMsg.classList.add('hidden');
            resultContainer.classList.add('hidden');
            resultContainer.classList.remove('reveal'); // Reset animation

            if (!h1 || !h2) return showError('Please enter both hexadecimal values.');

            const hexRegex = /^[0-9A-Fa-f]+$/;
            if (!hexRegex.test(h1) || !hexRegex.test(h2)) {
                return showError('Invalid input. Only 0-9 and A-F are allowed.');
            }

            try {
                // Mathematical Operation using BigInt for infinite precision
                const num1 = BigInt('0x' + h1);
                const num2 = BigInt('0x' + h2);
                const xorResult = num1 ^ num2;

                const maxLength = Math.max(h1.length, h2.length);
                const binaryMaxLength = maxLength * 4; 

                let finalHex = xorResult.toString(16).toUpperCase().padStart(maxLength, '0');
                
                let b1 = num1.toString(2).padStart(binaryMaxLength, '0');
                let b2 = num2.toString(2).padStart(binaryMaxLength, '0');
                let resB = xorResult.toString(2).padStart(binaryMaxLength, '0');

                const groupBits = (str) => str.match(/.{1,4}/g)?.join(' ') || str;

                // Update DOM elements
                document.getElementById('resHex').innerText = finalHex;
                document.getElementById('bin1').innerText = groupBits(b1);
                document.getElementById('bin2').innerText = groupBits(b2);
                document.getElementById('resBin').innerText = groupBits(resB);

                // Reveal results with animation
                setTimeout(() => resultContainer.classList.add('reveal'), 50);
                resultContainer.classList.remove('hidden');

            } catch (error) {
                showError('Calculation error. Number might be too large.');
            }
        }

        function showError(message) {
            document.getElementById('errorText').innerText = message;
            document.getElementById('errorMessage').classList.remove('hidden');
        }

        // Event Listeners
        ['hex1', 'hex2'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
            el.addEventListener('keypress', function(e) { if (e.key === 'Enter') calculateXOR(); });
        });
    </script>
</body>
</html>
